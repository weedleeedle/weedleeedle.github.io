name: 'Install Godot'
description: 'Installs and sets up godot'
inputs:
    version:
        description: "Godot version number"
        default: "4.6.2"
runs:
    using: "composite"
    steps:
        - name: "Create Godot Directory"
          run: mkdir godot
          shell: bash

        - name: "Print version"
          run: echo "=$VERSION"
          shell: bash
          env: 
            VERSION: ${{ inputs.version }}

        - name: "Download Godot"
          run: wget "https://downloads.godotengine.org/?version=${{ inputs.version }}&flavor=stable&slug=linux.x86_64.zip&platform=linux.64" -o godot.zip
          shell: bash

        - name: "PWD idk"
          run: pwd
          shell: bash

        - name: "Unzip Godot"
          run: unzip -p godot.zip > godot/godot
          shell: bash

        - name: "Set Permissions"
          run: chmod +x godot/godot
          shell: bash

        - name: "Add Godot to PATH"
          run: export GITHUB_PATH=$GITHUB_PATH:$(pwd)/godot
          shell: bash
